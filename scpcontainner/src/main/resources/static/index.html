<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation - 安全访问系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000 url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMwMDAwMDAiLz48Y2lyY2xlIGN4PSIxMCUiIGN5PSIxMCUiIHI9IjEiIGZpbGw9IiMwMDY0MDAiLz48Y2lyY2xlIGN4PSI5MCUiIGN5PSI5MCUiIHI9IjEiIGZpbGw9IiMwMDY0MDAiLz48L3N2Zz4=');
            background-size: cover;
            color: #0f0;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.15),
                    rgba(0, 0, 0, 0.15) 1px,
                    transparent 1px,
                    transparent 2px
            );
            pointer-events: none;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .login-box {
            background: rgba(0, 15, 0, 0.85);
            border: 1px solid #00aa00;
            border-radius: 5px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .login-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.1), transparent);
            transition: 0.5s;
        }

        .login-box:hover::before {
            left: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #0f0;
        }

        .subtitle {
            font-size: 14px;
            color: #0a0;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 20, 0, 0.7);
            border: 1px solid #0a0;
            border-radius: 3px;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #0f0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 30, 0, 0.7);
            border: 1px solid #0f0;
            border-radius: 3px;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .btn:hover {
            background: rgba(0, 50, 0, 0.9);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #0a0;
        }

        .access-level {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #0a0;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .warning {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border: 1px dashed #f00;
            color: #f00;
            font-size: 12px;
            background: rgba(255, 0, 0, 0.05);
        }

        .classified {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: #f00;
            transform: rotate(15deg);
            text-shadow: 0 0 10px #f00;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-box">
        <div class="classified">CLASSIFIED</div>

        <div class="header">
            <div class="logo">SCP FOUNDATION</div>
            <div class="subtitle">SECURE • CONTAIN • PROTECT</div>
        </div>

        <div id="app">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">PERSONNEL IDENTIFICATION:</label>
                    <input type="text" id="username" name="username" v-model="User.username" placeholder="输入员工ID" required>
                </div>

                <div class="form-group">
                    <label for="password">ACCESS KEY:</label>
                    <input type="password" id="password" name="password" v-model="User.password" placeholder="输入访问密钥" required>
                </div>

                <button type="button" class="btn" @click="submitForm">ACCESS SYSTEM</button>
                <button type="button" class="btn" @click="signup">Sign up</button>
            </form>
        </div>

        <div class="access-level blink">
            ACCESS LEVEL REQUIRED: MINIMUM LEVEL 1
        </div>

        <div class="warning">
            严禁未经授权的访问<br>
            违规可能导致终止或记忆修改<br>
            UNAUTHORIZED ACCESS IS STRICTLY PROHIBITED VIOLATION MAY RESULT IN TERMINATION OR MEMORY ALTERATION
        </div>

        <div class="footer">
            SCP Foundation Access Control System v0.0.1<br>
            @zzu-lsp
        </div>
    </div>
</div>

<!-- 正确加载Axios和Vue -->
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="https://unpkg.com/vue@3.3.4/dist/vue.global.prod.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    User: {
                        username: '',
                        password: '',
                        clearance: '1'
                    }
                }
            },
            methods: {
                submitForm() {
                    // 验证输入
                    if (!this.User.username || !this.User.password) {
                        alert('请输入用户名和密码');
                        return;
                    }

                    // 发送登录请求
                    axios.post('/login', {
                        username: this.User.username,
                        password: this.User.password,
                    })
                        .then(response => {
                            // 处理登录响应
                            if(response.data.success === true) {
                                alert(`ACCESS GRANTED\nWelcome, ${response.data.user.username}\nClearance Level: ${response.data.user.clearance}`);
                                window.location.href = 'interface1.html';
                            } else {
                                alert('ACCESS DENIED\n' + response.data.message);
                            }
                        })
                        .catch(error => {
                            console.error('登录错误:', error);
                            if (error.response) {
                                alert('服务器错误: ' + error.response.status);
                            } else if (error.request) {
                                alert('网络错误，请检查服务器是否运行');
                            } else {
                                alert('请求错误: ' + error.message);
                            }
                        });
                },

                signup() {
                    // 验证输入
                    if (!this.User.username || !this.User.password) {
                        alert('请输入用户名和密码');
                        return;
                    }

                    // 发送注册请求
                    axios.post('/signup', {
                        username: this.User.username,
                        password: this.User.password,
                        clearance: this.User.clearance
                    })
                        .then(response => {
                            // 处理注册响应
                            if(response.data.success === true) {
                                alert(`注册成功\n欢迎, ${this.User.username}\nClearance Level: ${this.User.clearance}`);
                                window.location.href = 'interface1.html';
                            } else {
                                // 显示具体的错误信息
                                alert('注册失败\n' + response.data.message);
                            }
                        })
                        .catch(error => {
                            console.error('注册错误:', error);
                            if (error.response) {
                                alert('服务器错误: ' + error.response.status + '\n' + (error.response.data.message || '注册失败'));
                            } else if (error.request) {
                                alert('网络错误，请检查服务器是否运行');
                            } else {
                                alert('请求错误: ' + error.message);
                            }
                        });
                }

            }
        }).mount('#app');
    });
</script>



</body>
</html>
